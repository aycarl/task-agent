openapi: 3.0.3
info:
  title: Task Agent API
  version: "1.0.0"
  description: >
    Rule-based task agent: submit a natural-language prompt, get back a
    result plus a step-by-step execution trace of which tool ran. Backed by
    DRF ModelViewSets — resources are hyperlinked (each object carries a
    `url` to itself) rather than addressed by id alone.
servers:
  - url: /api
paths:
  /tasks/:
    get:
      summary: List past tasks
      description: Most recent first. Lighter payload — no execution steps.
      operationId: listTasks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSummary"
    post:
      summary: Submit a new task
      description: >
        The prompt is routed through the agent (not saved as-is): `result`
        and `steps` are populated by tool execution, not accepted from the
        client.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  example: "What is 15 + 27?"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Bad Request — empty, missing, or whitespace-only prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /tasks/{id}/:
    get:
      summary: Fetch one task with its full execution trace
      operationId: getTask
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    put:
      summary: Replace a task's prompt
      description: >
        Only `prompt` is writable; `result`, `created_at`, and `steps` are
        read-only and untouched by this call (editing a task does not
        re-run the agent).
      operationId: updateTask
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    patch:
      summary: Partially update a task's prompt
      operationId: partialUpdateTask
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    delete:
      summary: Delete a task
      description: Cascades to delete the task's execution steps.
      operationId: deleteTask
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
  /steps/:
    get:
      summary: List all execution steps across all tasks
      operationId: listSteps
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionStep"
  /steps/{id}/:
    get:
      summary: Fetch a single execution step
      description: Read-only — steps are only ever produced by the agent, never client-authored.
      operationId: getStep
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionStep"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    ExecutionStep:
      type: object
      properties:
        url:
          type: string
          format: uri
        step_number:
          type: integer
        description:
          type: string
        tool_name:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
    TaskSummary:
      type: object
      properties:
        url:
          type: string
          format: uri
        id:
          type: integer
        prompt:
          type: string
        result:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    Task:
      allOf:
        - $ref: "#/components/schemas/TaskSummary"
        - type: object
          properties:
            steps:
              type: array
              readOnly: true
              items:
                $ref: "#/components/schemas/ExecutionStep"
    ValidationError:
      type: object
      description: DRF field-error shape — one array of messages per invalid field.
      additionalProperties:
        type: array
        items:
          type: string
      example:
        prompt: ["This field may not be blank."]
    NotFoundError:
      type: object
      properties:
        detail:
          type: string
      example:
        detail: "No Task matches the given query."
