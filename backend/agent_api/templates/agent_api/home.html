<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Agent</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      line-height: 1.5;
    }
    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #666; margin-top: 0; }
    .actions { display: flex; gap: 0.75rem; margin-top: 2rem; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.1rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #ccc;
      color: inherit;
    }
    .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn-secondary { background: transparent; }
  </style>
</head>
<body>
  <h1>Task Agent</h1>
  <p class="subtitle">Submit a prompt, the agent routes it to a tool, and returns a result with a step-by-step execution trace.</p>
  <div class="actions">
    <a class="btn btn-primary" href="{% url 'api-docs' %}">View API Docs</a>
    <a class="btn btn-secondary" href="/admin/login/?next=/admin/">Login as Django Admin</a>
  </div>
</body>
</html>
